{{- if .Values.monitoring.dashboards.enabled -}}
{{- $namespace := include "decent-exporter.dashboardNamespace" . -}}
{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "decent-exporter.fullname" $ }}-{{ base $path | trimSuffix ".json" }}
  namespace: {{ $namespace }}
  labels:
    {{- include "decent-exporter.labels" $ | nindent 4 }}
    {{- with $.Values.monitoring.dashboards.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $.Values.monitoring.dashboards.annotations }}
  annotations:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
data:
  {{ base $path }}: |-
{{ $.Files.Get $path | nindent 4 }}
{{- if $.Values.monitoring.dashboards.grafanaOperator.enabled }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: {{ include "decent-exporter.fullname" $ }}-{{ base $path | trimSuffix ".json" }}
  namespace: {{ $namespace }}
  labels:
    {{- include "decent-exporter.labels" $ | nindent 4 }}
spec:
  allowCrossNamespaceImport: {{ $.Values.monitoring.dashboards.grafanaOperator.allowCrossNamespaceImport }}
  resyncPeriod: {{ $.Values.monitoring.dashboards.grafanaOperator.resyncPeriod | quote }}
  {{- with $.Values.monitoring.dashboards.grafanaOperator.folder }}
  folder: {{ . | quote }}
  {{- end }}
  instanceSelector:
    matchLabels:
      {{- toYaml $.Values.monitoring.dashboards.grafanaOperator.matchLabels | nindent 6 }}
  configMapRef:
    name: {{ include "decent-exporter.fullname" $ }}-{{ base $path | trimSuffix ".json" }}
    key: {{ base $path }}
{{- end }}
{{- end }}
{{- end }}
