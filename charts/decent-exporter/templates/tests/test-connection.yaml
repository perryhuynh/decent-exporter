apiVersion: v1
kind: Pod
metadata:
  name: {{ include "decent-exporter.fullname" . }}-test-connection
  labels:
    {{- include "decent-exporter.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: "{{ .Values.tests.image.repository }}:{{ .Values.tests.image.tag }}"
      imagePullPolicy: {{ .Values.tests.image.pullPolicy }}
      command:
        - sh
        - -c
        - curl -fsS "http://{{ include "decent-exporter.fullname" . }}:{{ .Values.config.port }}/healthz"
